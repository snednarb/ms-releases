name: Build Microsoft Release JSON

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:

  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: Windows 10
            id: win10
            url: https://learn.microsoft.com/en-us/windows/release-health/release-information
            out: windows10.json
            lm: .cache/windows10.lastmod
            cachekey: lastmod-win10

          - name: Windows 11
            id: win11
            url: https://learn.microsoft.com/en-us/windows/release-health/windows11-release-information
            out: windows11.json
            lm: .cache/windows11.lastmod
            cachekey: lastmod-win11

          - name: Windows Server
            id: winserver
            url: https://learn.microsoft.com/en-us/windows/release-health/windows-server-release-info
            out: windowsserver.json
            lm: .cache/windowsserver.lastmod
            cachekey: lastmod-winserver

    env:
      URL: ${{ matrix.url }}
      OUT: ${{ matrix.out }}
      LM_FILE: ${{ matrix.lm }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/cache@v4
        with:
          path: .cache
          key: ${{ matrix.cachekey }}

      - name: Check Last-Modified
        id: lm
        run: |
          mkdir -p .cache
          NEW=$(curl -sI "$URL" | awk -F': ' 'tolower($0) ~ /^last-dodified/ {print $2}')
          OLD=""
          if [ -f "$LM_FILE" ]; then OLD=$(cat "$LM_FILE"); fi
          echo "DEBUG: new=$NEW old=$OLD"
          echo "new=$NEW" >> $GITHUB_OUTPUT
          echo "old=$OLD" >> $GITHUB_OUTPUT

      - name: Stop if unchanged (schedule)
        if: ${{ steps.lm.outputs.new == steps.lm.outputs.old && github.event_name == 'schedule' }}
        run: echo "No change detected; skipping."

      - uses: actions/setup-python@v5
        if: ${{ steps.lm.outputs.new != steps.lm.outputs.old || github.event_name != 'schedule' }}
        with:
          python-version: "3.12"

      - name: Install deps
        if: ${{ steps.lm.outputs.new != steps.lm.outputs.old || github.event_name != 'schedule' }}
        run: pip install requests beautifulsoup4

      - name: Generate JSON
        if: ${{ steps.lm.outputs.new != steps.lm.outputs.old || github.event_name != 'schedule' }}
        run: python ms_release_parser.py --url "$URL" --out "$OUT"

      - name: Update Last-Modified
        if: ${{ steps.lm.outputs.new != steps.lm.outputs.old || github.event_name != 'schedule' }}
        run: echo "${{ steps.lm.outputs.new }}" > "$LM_FILE"

      - name: Upload artifacts
        if: ${{ steps.lm.outputs.new != steps.lm.outputs.old || github.event_name != 'schedule' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.id }}
          path: |
            ${{ env.OUT }}
            ${{ env.LM_FILE }}


  commit-back:
    name: Commit all changes
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Microsoft release data"
            git push
          fi
