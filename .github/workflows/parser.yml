        if: ${{ steps.lm.outputs.new != steps.lm.outputs.old || github.event_name != 'schedule' }}
        run: echo "${{ steps.lm.outputs.new }}" > "$LM_FILE"



  commit-back:
    name: Commit all changes
    runs-on: ubuntu-latest
    needs:
      - windows10
      - windows11
      - windowsserver

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: .

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Microsoft release data"
            git push
          fi

